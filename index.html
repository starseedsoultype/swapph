<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SwapPH</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="error-banner" class="error-banner"></div>

  <div class="page">
    <header class="page-header">
      <span class="logo">SwapPH</span>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('ru');this.classList.add('active');document.querySelector('.lang-btn:last-child').classList.remove('active')">RU</button>
        <button class="lang-btn" onclick="setLang('en');this.classList.add('active');document.querySelector('.lang-btn:first-child').classList.remove('active')">EN</button>
      </div>
    </header>

    <div class="feed-stats" id="feed-stats"></div>

    <div class="filters">
      <div class="filter-row" id="filter-type"></div>
      <div class="filter-row" id="filter-category"></div>
    </div>

    <div class="feed-grid" id="feed-grid"></div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="feed">
      <span class="nav-icon">🏠</span>
      <span data-i18n="nav.feed">Лента</span>
    </a>
    <a href="add.html" class="nav-item" data-page="add">
      <span class="nav-icon">＋</span>
      <span data-i18n="nav.add">Добавить</span>
    </a>
    <a href="profile.html" class="nav-item" data-page="profile">
      <span class="nav-icon">👤</span>
      <span data-i18n="nav.profile">Профиль</span>
    </a>
  </nav>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/i18n.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
