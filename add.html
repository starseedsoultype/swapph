<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SwapPH</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="error-banner" class="error-banner"></div>

  <div class="page">
    <header class="page-header">
      <span class="logo">SwapPH</span>
    </header>

    <div class="form-page">
      <div class="photo-area">
        <label class="form-label" data-i18n="add.photos">Фото</label>
        <div class="photo-preview" id="photo-preview"></div>
        <div class="photo-add-btn" id="photo-add-btn" onclick="document.getElementById('photo-input').click()">+</div>
        <input type="file" id="photo-input" accept="image/*" multiple style="display:none">
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="add.name">Название</label>
        <input type="text" id="title-input" class="form-input" data-i18n-placeholder="add.name">
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="add.description">Описание</label>
        <textarea id="description-input" class="form-textarea" rows="3"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="add.category">Категория</label>
        <select id="category-select" class="form-select">
          <option value="">—</option>
          <option value="clothes" data-i18n="category.clothes">Одежда</option>
          <option value="shoes" data-i18n="category.shoes">Обувь</option>
          <option value="accessories" data-i18n="category.accessories">Аксессуары</option>
          <option value="swimwear" data-i18n="category.swimwear">Купальники</option>
          <option value="kids" data-i18n="category.kids">Детское</option>
          <option value="home" data-i18n="category.home">Для дома</option>
          <option value="books" data-i18n="category.books">Книги</option>
          <option value="other" data-i18n="category.other">Другое</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="add.type">Тип</label>
        <select id="type-select" class="form-select">
          <option value="">—</option>
          <option value="swap" data-i18n="listing.swap">Обмен</option>
          <option value="sale" data-i18n="listing.sale">Продажа</option>
          <option value="free" data-i18n="listing.free">Даром</option>
        </select>
      </div>

      <div class="form-group" id="price-row" style="display:none">
        <label class="form-label" data-i18n="add.price">Цена (THB)</label>
        <input type="number" id="price-input" class="form-input" min="0">
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="add.size">Размер</label>
        <select id="size-select" class="form-select">
          <option value="">—</option>
          <option value="XS">XS</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="One size">One size</option>
          <option value="Kids">Kids</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="add.condition">Состояние</label>
        <select id="condition-select" class="form-select">
          <option value="">—</option>
          <option value="new" data-i18n="listing.condition.new">Новое</option>
          <option value="like_new" data-i18n="listing.condition.like_new">Как новое</option>
          <option value="good" data-i18n="listing.condition.good">Хорошее</option>
          <option value="used" data-i18n="listing.condition.used">Б/у</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="add.location">Локация</label>
        <input type="text" id="location-input" class="form-input" placeholder="Srithanu, Haad Rin...">
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="add.available_from">Доступно с</label>
        <input type="date" id="from-input" class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="add.available_until">Доступно до</label>
        <input type="date" id="until-input" class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="add.language">Язык объявления</label>
        <select id="lang-select" class="form-select">
          <option value="ru">RU — Русский</option>
          <option value="en">EN — English</option>
        </select>
      </div>
      <div class="form-group">
        <button class="btn btn-primary" id="submit-btn" data-i18n="add.publish" onclick="submitListing()" style="width:100%;margin-top:8px">Опубликовать</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="feed">
      <span class="nav-icon">🏠</span>
      <span data-i18n="nav.feed">Лента</span>
    </a>
    <a href="add.html" class="nav-item" data-page="add">
      <span class="nav-icon">＋</span>
      <span data-i18n="nav.add">Добавить</span>
    </a>
    <a href="profile.html" class="nav-item" data-page="profile">
      <span class="nav-icon">👤</span>
      <span data-i18n="nav.profile">Профиль</span>
    </a>
  </nav>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/i18n.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/add.js"></script>
</body>
</html>
