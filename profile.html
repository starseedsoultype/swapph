<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SwapPH</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="error-banner" class="error-banner"></div>

  <div class="page">
    <header class="page-header">
      <span class="logo">SwapPH</span>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('ru');this.classList.add('active');document.querySelector('.lang-btn:last-child').classList.remove('active')">RU</button>
        <button class="lang-btn" onclick="setLang('en');this.classList.add('active');document.querySelector('.lang-btn:first-child').classList.remove('active')">EN</button>
      </div>
    </header>

    <div class="profile-header">
      <img id="profile-avatar" class="profile-avatar" src="" alt="" style="display:none">
      <h2 class="profile-name" id="profile-name"></h2>
      <span class="profile-since" id="profile-since"></span>
      <button class="btn availability-btn available" id="availability-btn"></button>
    </div>

    <div class="profile-section">
      <h3 class="section-title" data-i18n="profile.edit_contacts">Контакты</h3>
      <div class="form-group">
        <label class="form-label">Instagram</label>
        <input type="text" id="instagram-input" class="form-input" placeholder="@username">
      </div>
      <button class="btn btn-secondary" id="save-contacts-btn" data-i18n="profile.save">Сохранить</button>
    </div>

    <div id="admin-link" style="display:none; text-align:center; padding: 4px 0 16px">
      <a href="dashboard.html" style="color: var(--color-text-muted); font-size: 12px; text-decoration: none">⚙ Admin dashboard</a>
    </div>

    <div class="profile-section">
      <h3 class="section-title" data-i18n="profile.my_listings">Мои объявления</h3>
      <div class="profile-tabs">
        <button class="tab-btn active" id="tab-active" data-i18n="profile.active">Активные</button>
        <button class="tab-btn" id="tab-archive" data-i18n="profile.archive">Архив</button>
      </div>
      <div id="my-listings"></div>
    </div>
  </div>

  <div class="legal-footer">
    <a href="privacy.html" class="legal-link">Privacy Policy</a>
    <span class="legal-sep">·</span>
    <a href="terms.html" class="legal-link">Terms of Use</a>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="feed">
      <span class="nav-icon">🏠</span>
      <span data-i18n="nav.feed">Лента</span>
    </a>
    <a href="add.html" class="nav-item" data-page="add">
      <span class="nav-icon">＋</span>
      <span data-i18n="nav.add">Добавить</span>
    </a>
    <a href="profile.html" class="nav-item" data-page="profile">
      <span class="nav-icon">👤</span>
      <span data-i18n="nav.profile">Профиль</span>
    </a>
  </nav>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/i18n.js?v=4"></script>
  <script src="js/supabase.js?v=5"></script>
  <script src="js/app.js?v=4"></script>
  <script src="js/profile.js?v=1"></script>
</body>
</html>
